---
deployment:
  tasks:
    - export DEPLOYPATH=/home/$USER/public_html/
    - /bin/mkdir -p $DEPLOYPATH

    # Copia os arquivos principais do site
    - /bin/cp -f index.html $DEPLOYPATH
    - /bin/cp -f modelos.html $DEPLOYPATH
    - /bin/cp -f contato.html $DEPLOYPATH
    - /bin/cp -f projeto.html $DEPLOYPATH
    - /bin/cp -f sobre-nos.html $DEPLOYPATH
    - /bin/cp -f politica-de-privacidade.html $DEPLOYPATH
    - /bin/cp -f .htaccess $DEPLOYPATH

    # Copia as pastas necessárias
    - /bin/cp -R css $DEPLOYPATH
    - /bin/cp -R js $DEPLOYPATH
    - /bin/cp -R images $DEPLOYPATH
    - /bin/cp -R api $DEPLOYPATH

    # Permissões recomendadas
    - /bin/find $DEPLOYPATH -type d -exec /bin/chmod 755 {} \;
    - /bin/find $DEPLOYPATH -type f -exec /bin/chmod 644 {} \;
